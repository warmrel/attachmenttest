<!DOCTYPE html>
<html lang="ko">
<head>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* =========================================================
   Reset & Base
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html {
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: 'Noto Serif KR', 'Nanum Myeongjo', 'Apple SD Gothic Neo', serif;
  background: radial-gradient(ellipse at top, #fef0f2 0%, #fbe5e8 40%, #f5d5db 100%);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: #2a1820;
  line-height: 1.5;
}
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  color: inherit;
}
ul { list-style: none; padding: 0; margin: 0; }
h1, h2, h3, h4, p { margin: 0; }

.app { min-height: 100vh; min-height: 100dvh; }
.container { max-width: 560px; margin: 0 auto; padding: 0 20px; }

/* =========================================================
   초기 로딩
   ========================================================= */
.initial-loader {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at top, #fef0f2 0%, #fbe5e8 40%, #f5d5db 100%);
  font-family: 'Nanum Myeongjo', serif;
  color: #8a5a6a;
  z-index: 9999;
  transition: opacity 0.4s ease;
}
.initial-loader.hidden { opacity: 0; pointer-events: none; }
.loader-spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(168, 93, 111, 0.2);
  border-top-color: #a85d6f;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
.loader-text { font-size: 14px; letter-spacing: 0.1em; }

/* =========================================================
   Animations
   ========================================================= */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* =========================================================
   인트로
   ========================================================= */
.intro {
  padding: 56px 20px 48px;
  max-width: 560px;
  margin: 0 auto;
  animation: fadeUp 0.5s ease-out both;
}
.intro-header { text-align: center; margin-bottom: 44px; }
.intro-badge {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #8a5a6a;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(168, 93, 111, 0.2);
  padding: 8px 16px;
  border-radius: 999px;
  margin-bottom: 24px;
}
.intro-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 38px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: #3a2530;
  margin-bottom: 24px;
}
.intro-subtitle {
  font-size: 15px;
  color: #6a4a55;
  font-weight: 300;
  margin-bottom: 4px;
}
.intro-source { font-size: 13px; color: #9a7a85; }

.info-card {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(168, 93, 111, 0.15);
  box-shadow: 0 8px 32px rgba(168, 93, 111, 0.08);
  border-radius: 24px;
  padding: 28px;
  margin-bottom: 20px;
}
.info-card h2 {
  font-size: 17px;
  font-weight: 600;
  color: #3a2530;
  margin-bottom: 16px;
}
.info-card p {
  font-size: 14px;
  line-height: 1.7;
  color: #5a4048;
  margin-bottom: 12px;
}
.info-card p:last-of-type { margin-bottom: 16px; }
.info-card strong { color: #a85d6f; font-weight: 600; }

.score-guide-list {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(245, 213, 219, 0.7);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.score-guide { display: flex; align-items: center; gap: 12px; }
.score-guide-num {
  flex-shrink: 0;
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #f5d5db, #e8b8c2);
  color: #6a3a48;
  font-weight: 600;
  font-size: 12px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.score-guide-text { font-size: 14px; color: #5a4048; }

.note-card {
  background: rgba(245, 213, 219, 0.5);
  color: #6a4a55;
  font-weight: 300;
  font-size: 13px;
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 32px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  line-height: 1.6;
}
.note-card-icon { color: #a85d6f; flex-shrink: 0; }

.btn-primary {
  width: 100%;
  padding: 18px;
  border-radius: 18px;
  color: white;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.02em;
  background: linear-gradient(135deg, #a85d6f 0%, #8a4a5c 100%);
  box-shadow: 0 8px 24px rgba(168, 93, 111, 0.35);
  transition: transform 0.15s ease, box-shadow 0.2s ease;
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  background: linear-gradient(135deg, #c8a8b0, #b89098);
  box-shadow: none;
}

/* =========================================================
   진행률
   ========================================================= */
.progress-bar {
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 14px 20px;
  background: rgba(255, 240, 242, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(168, 93, 111, 0.12);
}
.progress-inner { max-width: 560px; margin: 0 auto; }
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label { font-size: 11px; letter-spacing: 0.05em; color: #8a5a6a; font-weight: 500; }
.progress-count { font-size: 12px; color: #3a2530; font-weight: 600; }
.progress-track {
  height: 6px;
  background: rgba(168, 93, 111, 0.15);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #c98a99, #a85d6f);
  border-radius: 999px;
  transition: width 0.5s ease;
}
.progress-hint {
  font-size: 11px;
  text-align: center;
  color: #a07585;
  font-weight: 400;
}

/* =========================================================
   테스트
   ========================================================= */
.test-view { padding-bottom: calc(96px + env(safe-area-inset-bottom)); }
.test-content { padding-top: 32px; }

.group-section { margin-bottom: 40px; }
.group-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.group-badge {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 15px;
}
.group-eyebrow {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-weight: 600;
}
.group-name { font-size: 16px; color: #3a2530; font-weight: 600; }

.question-card {
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(168, 93, 111, 0.12);
  box-shadow: 0 2px 8px rgba(168, 93, 111, 0.05);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
  transition: all 0.3s ease;
}
.question-card.answered { background: rgba(255, 255, 255, 0.92); }
.question-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
}
.question-tag {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
  margin-top: 2px;
  white-space: nowrap;
}
.question-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 15px;
  font-weight: 600;
  color: #2a1820;
  line-height: 1.45;
}
.question-items {
  margin-left: 6px;
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.question-item {
  font-size: 13px;
  line-height: 1.6;
  color: #5a4048;
  font-weight: 300;
  display: flex;
  gap: 8px;
}
.question-item-bullet { margin-top: 2px; flex-shrink: 0; }
.question-item-text { flex: 1; word-break: keep-all; }

.score-buttons { display: flex; gap: 8px; }
.score-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: 12px;
  font-size: 13px;
  background: rgba(255, 255, 255, 0.7);
  color: #6a4a55;
  font-weight: 400;
  border: 1px solid rgba(168, 93, 111, 0.18);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.score-btn:active { transform: scale(0.94); }
.score-btn.selected {
  border: none;
  color: white;
  font-weight: 600;
}
.score-btn-num { font-size: 15px; font-weight: 600; }
.score-btn.selected .score-btn-num { font-weight: 700; }
.score-btn-label {
  font-size: 10px;
  opacity: 0.85;
  letter-spacing: 0.02em;
  line-height: 1.3;
  text-align: center;
}

.submit-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
  background: rgba(255, 240, 242, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(168, 93, 111, 0.15);
}
.submit-inner { max-width: 560px; margin: 0 auto; }

/* =========================================================
   결과
   ========================================================= */
.result {
  padding: 48px 20px 64px;
  max-width: 560px;
  margin: 0 auto;
  animation: fadeUp 0.5s ease-out both;
}
.result-header {
  text-align: center;
  margin-bottom: 36px;
  animation: scaleIn 0.4s ease-out both;
}
.result-eyebrow {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #8a5a6a;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(168, 93, 111, 0.2);
  padding: 8px 16px;
  border-radius: 999px;
  margin-bottom: 20px;
}
.result-prompt {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 28px;
  font-weight: 700;
  color: #3a2530;
  line-height: 1.2;
  margin-bottom: 12px;
}
.result-type-name {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 8px;
  line-height: 1.1;
}
.result-type-en {
  font-size: 13px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-weight: 500;
}

/* 동점 표시 */
.tied-types-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  margin-bottom: 8px;
}
.tied-type {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 36px;
  font-weight: 800;
  line-height: 1.15;
  display: block;
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.tied-plus {
  display: block;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 20px;
  font-weight: 400;
  color: #c98a99;
  line-height: 1;
  margin: 2px 0;
  background: none !important;
  -webkit-text-fill-color: #c98a99 !important;
}
.tied-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}
.result-card-tied {
  margin-bottom: 0 !important;
  padding: 22px !important;
}
.tied-note {
  font-size: 12px;
  line-height: 1.7;
  color: #6a4a55;
  font-weight: 300;
  text-align: center;
  padding: 14px 18px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px dashed rgba(168, 93, 111, 0.25);
  border-radius: 14px;
  word-break: keep-all;
  margin: 0;
}

.result-card {
  border-radius: 24px;
  padding: 28px;
  margin-bottom: 20px;
  animation: scaleIn 0.4s ease-out 0.1s both;
  background-color: rgba(255, 255, 255, 0.7);
}
.result-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.result-tag {
  font-size: 11px;
  letter-spacing: 0.05em;
  background: rgba(255, 255, 255, 0.6);
  padding: 4px 12px;
  border-radius: 999px;
  font-weight: 600;
}
.result-score { text-align: right; }
.result-score-num { font-size: 30px; font-weight: 700; }
.result-score-total { font-size: 13px; margin-left: 4px; opacity: 0.7; }
.result-card-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 19px;
  font-weight: 700;
  color: #2a1820;
  line-height: 1.45;
  margin-bottom: 12px;
  word-break: keep-all;
}
.result-card-desc {
  font-size: 13px;
  line-height: 1.7;
  color: #4a3038;
  font-weight: 300;
  word-break: keep-all;
}

.warning-card {
  background: rgba(255, 248, 225, 0.7);
  border: 1px solid rgba(200, 150, 50, 0.25);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 20px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: scaleIn 0.4s ease-out 0.2s both;
}
.warning-icon { color: #b8852a; font-size: 18px; flex-shrink: 0; }
.warning-title { font-size: 13px; color: #7a5a18; font-weight: 600; margin-bottom: 6px; }
.warning-desc { font-size: 12px; line-height: 1.6; color: #6a5028; word-break: keep-all; }

.score-section {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(168, 93, 111, 0.12);
  border-radius: 18px;
  padding: 24px;
  margin-bottom: 20px;
}
.score-section-title {
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #8a5a6a;
  font-weight: 600;
  margin-bottom: 20px;
}
.score-bars { display: flex; flex-direction: column; gap: 16px; }
.score-bar-row { width: 100%; }
.score-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 8px;
}
.score-bar-info {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.score-bar-badge {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 11px;
  font-weight: 700;
}
.score-bar-type { font-size: 13px; color: #3a2530; font-weight: 600; }
.score-bar-level {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
}
.score-bar-points { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.score-bar-points-total { opacity: 0.5; font-weight: 400; }
.score-bar-track {
  height: 8px;
  background: rgba(168, 93, 111, 0.1);
  border-radius: 999px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 1s ease;
}

.legend {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(168, 93, 111, 0.15);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #7a5a65;
  flex-wrap: wrap;
  gap: 8px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-weight: 500; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.detail-section { margin-bottom: 32px; }
.detail-section-title {
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #8a5a6a;
  font-weight: 600;
  padding: 0 8px;
  margin-bottom: 16px;
}
.detail-card {
  background: rgba(255, 255, 255, 0.65);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 12px;
}
.detail-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.detail-card-left { display: flex; align-items: center; gap: 8px; }
.detail-card-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 600;
}
.detail-card-type { font-size: 15px; color: #3a2530; font-weight: 700; }
.detail-card-score { font-size: 11px; font-weight: 600; }
.detail-card-desc {
  font-size: 12px;
  line-height: 1.7;
  color: #5a4048;
  font-weight: 300;
  word-break: keep-all;
}

.disclaimer {
  background: rgba(255, 255, 255, 0.5);
  border: 1px dashed rgba(168, 93, 111, 0.25);
  border-radius: 18px;
  padding: 22px;
  margin-bottom: 16px;
  text-align: center;
  font-size: 13px;
  line-height: 1.7;
  color: #6a4a55;
  font-weight: 300;
}

.action-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.action-btn {
  padding: 16px 12px;
  border-radius: 16px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.15s ease;
}
.action-btn:active:not(:disabled) { transform: scale(0.97); }
.action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.action-btn-icon { display: inline-flex; align-items: center; justify-content: center; }

.share-hint {
  font-size: 11px;
  text-align: center;
  color: #8a6a75;
  font-weight: 300;
  margin-bottom: 20px;
  line-height: 1.5;
  padding: 0 8px;
}

.btn-secondary {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 500;
  color: #6a4a55;
  background: rgba(255, 255, 255, 0.8);
  border: 1px solid rgba(168, 93, 111, 0.25);
  transition: transform 0.15s ease;
}
.btn-secondary:active { transform: scale(0.98); }

/* =========================================================
   토스트
   ========================================================= */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  padding: 12px 22px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  color: white;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  animation: fadeUp 0.3s ease-out;
  max-width: calc(100% - 40px);
  text-align: center;
}
.toast-success { background: rgba(60, 90, 70, 0.95); }
.toast-error { background: rgba(140, 50, 60, 0.95); }

/* =========================================================
   반응형: 작은 모바일 (375px 이하)
   ========================================================= */
@media (max-width: 375px) {
  .container { padding: 0 16px; }
  .intro { padding: 40px 16px 36px; }

function classifyScore(total) {
  if (total <= 17) return { level: "low", label: "아주 낮음", desc: "이 유형은 확실히 아님" };
  if (total <= 22) return { level: "medium", label: "보통", desc: "이 유형의 경향이 나타나는 편" };
  return { level: "high", label: "높음", desc: "확실히 이 유형" };
}

function App() {
  const [stage, setStage] = useState("intro");
  const [answers, setAnswers] = useState({});

  const allQuestions = [];
  Object.values(GROUPS).forEach((g) => {
    g.questions.forEach((q, i) => {
      allQuestions.push({ groupKey: g.key, qIdx: i, ...q });
    });
  });

  const answeredCount = Object.keys(answers).length;
  const totalCount = allQuestions.length;
  const progress = (answeredCount / totalCount) * 100;

  function setAnswer(groupKey, qIdx, value) {
    const key = `${groupKey}-${qIdx}`;
    setAnswers((prev) => ({ ...prev, [key]: value }));
  }

  function calculateScores() {
    const scores = { A: 0, B: 0, C: 0 };
    Object.entries(answers).forEach(([key, val]) => {
      const [g] = key.split("-");
      scores[g] += val;
    });
    return scores;
  }

  function startTest() {
    setStage("test");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function submitTest() {
    if (answeredCount < totalCount) {
      const firstUnanswered = allQuestions.findIndex(
        (q) => answers[`${q.groupKey}-${q.qIdx}`] === undefined
      );
      if (firstUnanswered >= 0) {
        const el = document.getElementById(
          `q-${allQuestions[firstUnanswered].groupKey}-${allQuestions[firstUnanswered].qIdx}`
        );
        if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
      }
      return;
    }
    setStage("result");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function reset() {
    setAnswers({});
    setStage("intro");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  return (
    <div className="app">
      {stage === "intro" && <IntroView onStart={startTest} />}
      {stage === "test" && (
        <TestView
          allQuestions={allQuestions}
          answers={answers}
          setAnswer={setAnswer}
          progress={progress}
          answeredCount={answeredCount}
          totalCount={totalCount}
          onSubmit={submitTest}
        />
      )}
      {stage === "result" && (
        <ResultView scores={calculateScores()} onReset={reset} />
      )}
    </div>
  );
}

function ResultView({ scores, onReset }) {
  const ranked = Object.entries(scores)
    .map(([key, total]) => ({
      key, total,
      ...classifyScore(total),
      ...GROUPS[key],
      interp: RESULT_INTERPRETATIONS[key],
    }))
    .sort((a, b) => b.total - a.total);

  // 동점 처리: 최고점과 같은 점수를 받은 모든 유형
  const topScore = ranked[0].total;
  const topTypes = ranked.filter((r) => r.total === topScore);
  const isAllTied = topTypes.length === 3;        // 3개 모두 동점
  const isTopTwoTied = topTypes.length === 2;     // 상위 2개 동점
  const primary = ranked[0]; // 그래픽용 대표 색상 등에 사용
  const highTypes = ranked.filter((r) => r.level === "high");
  const isCombined = highTypes.length >= 2;

  // 결과 표시용 라벨/색상
  const displayTypeLabel = topTypes.map((t) => t.type).join(" + ");
  const displayEnLabel = topTypes
    .map((t) => t.interp.short.split(" ")[1]?.replace(/[()]/g, ""))
    .join(" + ");

  // 캡처/공유 관련
  const captureFullRef = useRef(null);
  const captureSummaryRef = useRef(null);
  const [capturing, setCapturing] = useState(false);
  const [toast, setToast] = useState(null);

  function showToast(type, msg) {
    setToast({ type, msg });
    setTimeout(() => setToast(null), 2500);
  }

  async function captureNode(node, filename) {
    const html2canvas = await loadHtml2Canvas();
    if (!node) return;

    // 노드의 실제 렌더링된 크기를 명시적으로 측정
    const rect = node.getBoundingClientRect();
    const width = Math.ceil(rect.width);
    const height = Math.ceil(rect.height);

    const canvas = await html2canvas(node, {
      backgroundColor: "#fbe5e8",
      scale: 2,
      useCORS: true,
      allowTaint: false,
      logging: false,
      width: width,
      height: height,
      windowWidth: width,
      windowHeight: height,
      // 노드 영역 외부는 캡처하지 않도록
      x: 0,
      y: 0,
      scrollX: 0,
      scrollY: 0,
    });

    const dataUrl = canvas.toDataURL("image/png");
    const link = document.createElement("a");
    link.download = filename;
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  async function handleCaptureFull() {
    if (capturing) return;
    setCapturing(true);
    try {
      await captureNode(
        captureFullRef.current,
        `애착유형테스트_전체_${displayTypeLabel.replace(/ \+ /g, "_")}.png`
      );
      showToast("success", "전체 결과가 저장되었습니다");
    } catch (e) {
      console.error(e);
      showToast("error", "캡처에 실패했습니다");
    } finally {
      setCapturing(false);
    }
  }

  async function handleCaptureSummary() {
    if (capturing) return;
    setCapturing(true);
    try {
      await captureNode(
        captureSummaryRef.current,
        `애착유형테스트_결과_${displayTypeLabel.replace(/ \+ /g, "_")}.png`
      );
      showToast("success", "결과가 저장되었습니다");
    } catch (e) {
      console.error(e);
      showToast("error", "캡처에 실패했습니다");
    } finally {
      setCapturing(false);
    }
  }

  return (
    <div className="result">
      {toast && (
        <div className={`toast toast-${toast.type}`}>{toast.msg}</div>
      )}

      {/* 전체 캡처 영역 시작 (헤더 ~ 마지막 disclaimer) */}
      <div ref={captureFullRef}>

        {/* 결과만 캡처 영역 시작 (헤더 ~ 그룹별 점수 분포) */}
        <div ref={captureSummaryRef}>
          <div className="result-header">
            <div className="result-eyebrow">Your Result</div>
            <h1 className="result-prompt">
              {isAllTied ? "세 유형의 점수가 같아요" : "애착 유형은"}
            </h1>

            {isAllTied || isTopTwoTied ? (
              <div className="tied-types-row">
                {topTypes.map((t, i) => (
                  <React.Fragment key={t.key}>
                    <span
                      className="tied-type"
                      style={{
                        backgroundImage: `linear-gradient(135deg, ${t.color}, ${t.accent})`,
                      }}
                    >
                      {t.type}
                    </span>
                    {i < topTypes.length - 1 && (
                      <span className="tied-plus">+</span>
                    )}
                  </React.Fragment>
                ))}
              </div>
            ) : (
              <div
                className="result-type-name"
                style={{
                  background: `linear-gradient(135deg, ${primary.color}, ${primary.accent})`,
                  WebkitBackgroundClip: "text",
                  WebkitTextFillColor: "transparent",
                  backgroundClip: "text",
                }}
              >
                {primary.type}
              </div>
            )}

            {topTypes.length === 1 && (
              <p
                className="result-type-en"
                style={{ color: primary.color }}
              >
                {primary.interp.short.split(" ")[1]?.replace(/[()]/g, "")}
              </p>
            )}
          </div>

          {/* 메인 결과 카드: 동점이면 카드들을 나란히, 아니면 단일 */}
          {topTypes.length === 1 ? (
            <div
              className="result-card"
              style={{
                backgroundImage: `linear-gradient(135deg, ${primary.accent}40, ${primary.color}25)`,
                backgroundColor: "rgba(255, 255, 255, 0.85)",
                border: `1px solid ${primary.color}40`,
                boxShadow: `0 12px 40px ${primary.color}25`,
              }}
            >
              <div className="result-card-header">
                <span
                  className="result-tag"
                  style={{ color: primary.color }}
                >
                  가장 높은 점수
                </span>
                <div
                  className="result-score"
                  style={{ color: primary.color }}
                >
                  <span className="result-score-num">{primary.total}</span>
                  <span className="result-score-total">/ 33</span>
                </div>
              </div>
              <h2 className="result-card-title">{primary.interp.title}</h2>
              <p className="result-card-desc">{primary.interp.desc}</p>
            </div>
          ) : (
            <div className="tied-cards">
              {topTypes.map((t) => (
                <div
                  key={t.key}
                  className="result-card result-card-tied"
                  style={{
                    backgroundImage: `linear-gradient(135deg, ${t.accent}40, ${t.color}25)`,
                    backgroundColor: "rgba(255, 255, 255, 0.85)",
                    border: `1px solid ${t.color}40`,

                      style={{ color: t.color }}

                      <span className="result-score-num">{t.total}</span>

                  <p className="result-card-desc">{t.interp.desc}</p>

              ))}
              {isAllTied && (
                <p className="tied-note">
                  세 유형 모두 같은 점수입니다. 각 항목을 다시 떠올려보거나, 책의 「황금률」 5가지를 적용해 더 정확히 판별해보세요.
                </p>
              )}
              {isTopTwoTied && !isAllTied && (
                <p className="tied-note">
                  두 유형의 점수가 같습니다. 두 유형의 행동은 서로 다른 심리에서 비롯되더라도 겉으로 비슷해 보일 수 있어요. 책의 「황금률」을 참고해 구분해보세요.
                </p>
              )}
            </div>
          )}

          {isCombined &&
            highTypes.some((t) => t.key === "A") &&
            highTypes.some((t) => t.key === "C") && (
              <div className="warning-card">
                <span className="warning-icon">◈</span>
                <div>
                  <h3 className="warning-title">두 유형(회피형 · 불안형)이 모두 높게 나왔습니다</h3>
                  <p className="warning-desc">
                    두 유형이 보이는 행동은 전혀 다른 심리에서 비롯된 것일지라도 겉으로는 비슷해 보일 때가 많습니다. 책의 「황금률」 5가지를 적용해 더 정확히 판단해보세요.
                  </p>
                </div>
              </div>
            )}

          <div className="score-section">
            <h3 className="score-section-title">그룹별 점수 분포</h3>
            <div className="score-bars">
              {ranked
                .sort((a, b) => a.key.localeCompare(b.key))
                .map((r) => <ScoreBar key={r.key} result={r} />)}
            </div>
            <div className="legend">
              <Legend dot="#c8a8b0" label="11–17 낮음" />
              <Legend dot="#d8908a" label="18–22 보통" />
              <Legend dot="#a85d6f" label="23–33 높음" />
            </div>
          </div>
        </div>
        {/* 결과만 캡처 영역 끝 */}

        <div className="detail-section">
          <h3 className="detail-section-title">유형별 상세 해설</h3>
          {ranked
            .sort((a, b) => a.key.localeCompare(b.key))
            .map((r) => <DetailCard key={r.key} result={r} />)}
        </div>

        <div className="disclaimer">
          이 테스트는 자가진단을 위한 참고 자료입니다.<br />
          본인 또는 연인(배우자)과의 실제 관계에서 관찰한 내용을 바탕으로<br />
          애착 유형의 경향을 가늠해보는 도구로 활용해 주세요.
        </div>
      </div>
      {/* 전체 캡처 영역 끝 */}

      <div className="action-buttons">
        <button
          className="action-btn"
          onClick={handleCaptureSummary}
          disabled={capturing}
          style={{
            color: "white",
            background: `linear-gradient(135deg, ${primary.color}, ${primary.accent})`,
            boxShadow: `0 6px 20px ${primary.color}35`,
          }}
        >
          {capturing ? (
            <><Spinner /> 처리 중…</>
          ) : (
            <><IconCamera /> 결과만 캡처</>
          )}
        </button>

        <button
          className="action-btn"
          onClick={handleCaptureFull}
          disabled={capturing}
          style={{
            color: primary.color,
            background: "rgba(255, 255, 255, 0.9)",
            border: `1.5px solid ${primary.color}`,
          }}
        >
          {capturing ? (
            <><Spinner color={primary.color} /> 처리 중…</>
          ) : (
            <><IconCamera /> 전체 캡처</>
          )}
        </button>
      </div>

      <p className="share-hint">
        ‘결과만 캡처’는 상단부터 점수 분포까지 / ‘전체 캡처’는 상세 해설까지 포함합니다
      </p>

      <button className="btn-secondary" onClick={onReset}>
        ↻ 다시 테스트하기
      </button>
    </div>
  );
}

function ScoreBar({ result }) {
  const pct = (result.total / 33) * 100;
  const levelColor = {
    low: "#c8a8b0",
    medium: "#d8908a",
    high: result.color,
  }[result.level];

  return (
    <div className="score-bar-row">
      <div className="score-bar-header">
        <div className="score-bar-info">
          <div
            className="score-bar-badge"
            style={{ background: `linear-gradient(135deg, ${result.color}, ${result.accent})` }}
          >
            {result.key}
          </div>
          <span className="score-bar-type">{result.type}</span>
          <span
            className="score-bar-level"
            style={{ background: levelColor + "25", color: levelColor }}
          >
            {result.label}
          </span>
        </div>
        <span className="score-bar-points" style={{ color: result.color }}>
          {result.total}
          <span className="score-bar-points-total"> / 33</span>
        </span>
      </div>
      <div className="score-bar-track">
        <div
          className="score-bar-fill"
          style={{
            width: `${pct}%`,
            background: `linear-gradient(90deg, ${result.accent}, ${result.color})`,
          }}
        />
      </div>
    </div>
  );
}

function Legend({ dot, label }) {
  return (
    <div className="legend-item">
      <span className="legend-dot" style={{ background: dot }} />
      <span>{label}</span>
    </div>
  );
}

function DetailCard({ result }) {
  return (
    <div
      className="detail-card"
      style={{ border: `1px solid ${result.color}20` }}
    >
      <div className="detail-card-header">
        <div className="detail-card-left">
          <span
            className="detail-card-tag"
            style={{ background: result.color + "15", color: result.color }}
          >
            {result.key} 그룹
          </span>
          <span className="detail-card-type">{result.type}</span>
        </div>
        <span className="detail-card-score" style={{ color: result.color }}>
          {result.total}점 · {result.label}
        </span>
      </div>
      <p className="detail-card-desc">{result.interp.desc}</p>
    </div>
  );
}

// ============================================================
// 아이콘
// ============================================================
function IconCamera() {
  return (
    <span className="action-btn-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </span>
  );
}

function Spinner({ color = "white" }) {
  return (
    <span className="action-btn-icon" style={{ animation: "spin 0.8s linear infinite" }}>
      <svg width="14" height="14" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="none" stroke={color} strokeWidth="3" strokeOpacity="0.25" />
        <path d="M12 2 a10 10 0 0 1 10 10" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" />
      </svg>
    </span>
  );
}

// 마운트
const loader = document.getElementById('loader');
if (loader) {
  setTimeout(() => loader.classList.add('hidden'), 100);
  setTimeout(() => loader.remove(), 600);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
